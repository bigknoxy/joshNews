openapi: 3.0.0
info:
  title: Sources API
  version: 0.1.0
paths:
  /api/v1/sources:
    post:
      summary: Create a user source (link, rss_feed, or topic_keyword)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [link, rss_feed, topic_keyword]
                value:
                  type: string
              required: [type, value]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  type:
                    type: string
                  value:
                    type: string
                  metadata:
                    type: object
                required: [id, type, value]
    get:
      summary: List user sources
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    type:
                      type: string
                    value:
                      type: string
                    metadata:
                      type: object
  /api/v1/sources/{id}:
    put:
      summary: Update a source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                metadata:
                  type: object
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete a source
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
