openapi: 3.0.0
info:
  title: Dashboard API
  version: 0.1.0
paths:
  /api/v1/dashboards/{period}:
    get:
      summary: Get dashboard snapshot
      description: |-
        Returns a precomputed dashboard snapshot for the requested `period` (`daily` or `weekly`).
        The `items` array is ordered by `score` in descending order and is subject to per-period caps: daily snapshots are limited to 50 items and weekly snapshots to 200 items. Items are deduplicated by normalized `url`; when multiple items share the same `url`, the most recently ingested item (`ingested_at`) is kept. For items with equal `score` and different `url`s, ties are broken by `published_at` (newest first).
      parameters:
        - name: period
          in: path
          required: true
          schema:
            type: string
            enum: [daily, weekly]
      responses:
        '200':
          description: Snapshot retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  period:
                    type: string
                  startAt:
                    type: string
                    format: date-time
                  endAt:
                    type: string
                    format: date-time
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        contentItemId:
                          type: string
                        score:
                          type: number
                        signals:
                          type: object
        '404':
          description: Not found
