name: Bun CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node (for environment)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          export BUN_INSTALL="$HOME/.bun/bin"
          echo "::add-path::$HOME/.bun/bin"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test --verbose

      - name: Lint
        run: bun run lint -- --max-warnings=0

      - name: Format check
        run: bun run format -- --check
