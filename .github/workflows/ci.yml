name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/bun-action@v3
      - name: Install dependencies
        run: bun install
      - name: Run tests
        run: bun test --coverage
      - name: Run lint
        run: bun run lint || true
