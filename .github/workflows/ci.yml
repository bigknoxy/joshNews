name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Bun (use setup-bun)
        uses: oven-sh/setup-bun@v1
      - name: Verify Bun
        run: |
          echo "--- bun info ---"
          bun -v || true
          which bun || true
          node -v || true
      - name: Install dependencies (with retries)
        run: |
          for i in 1 2 3; do
            bun install && break || (echo "bun install failed, retrying... ($i)" && sleep 5)
          done
      - name: Run lint
        run: bun run lint -- --fix
      - name: Check format (prettier check with fallback)
        run: |
          npx prettier --check "**/*.{ts,tsx,js,json,md}" || npx prettier --write "**/*.{ts,tsx,js,json,md}"
      - name: Run tests
        run: bun test --coverage
